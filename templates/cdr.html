<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDR Analyzer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark:                        <nav className="nav">
                            <a href="/" className={`nav-link ${window.location.pathname === '/' ? 'active' : ''}`}>
                                <span className="nav-icon">📁</span>
                                Compare Billing Folders
                            </a>
                            <a href="/analyze" className={`nav-link ${window.location.pathname === '/analyze' ? 'active' : ''}`}>
                                <span className="nav-icon">📈</span>
                                Analyze All Senders
                            </a>
                            <a href="/cdr" className={`nav-link ${window.location.pathname === '/cdr' ? 'active' : ''}`}>
                                <span className="nav-icon">📱</span>
                                CDR Analyzer
                            </a>
                        </nav>         --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --cyan: #06b6d4;
            --pink: #ec4899;
            --dark: #1e1b4b;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: white;
            padding: 0;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-link {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--gray-300);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            transform: translateX(5px);
        }

        .nav-link.active {
            background: var(--gradient-1);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .nav-icon {
            font-size: 1.25rem;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--gray-400);
            font-size: 1.1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .upload-section h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .upload-zone.has-file {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .upload-text {
            color: var(--gray-400);
            font-size: 0.9rem;
        }

        .file-input {
            display: none;
        }

        .file-name {
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--success);
        }

        .search-section {
            margin-bottom: 1.5rem;
        }

        .search-section label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .search-input::placeholder {
            color: var(--gray-500);
        }

        /* Time Field Toggle */
        .time-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem;
            border-radius: 12px;
        }

        .time-toggle-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--gray-400);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .time-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .time-toggle-btn.active {
            background: var(--gradient-3);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .time-toggle-label {
            margin-bottom: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-actions {
            display: flex;
            justify-content: center;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 3rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            color: #fca5a5;
            text-align: center;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card:nth-child(2) .stat-value { background: var(--gradient-2); -webkit-background-clip: text; background-clip: text; }
        .stat-card:nth-child(3) .stat-value { background: var(--gradient-3); -webkit-background-clip: text; background-clip: text; }
        .stat-card:nth-child(4) .stat-value { background: var(--gradient-4); -webkit-background-clip: text; background-clip: text; }

        .stat-label {
            color: var(--gray-400);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .results-header h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .result-badges {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .result-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .result-badge.sender {
            background: var(--gradient-2);
        }

        .result-badge.time {
            background: var(--gradient-3);
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .archive-results {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .archive-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, rgba(139, 92, 246, 0.3) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .archive-results:nth-child(2) .archive-header {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.3) 0%, rgba(244, 114, 182, 0.3) 100%);
        }

        .archive-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .total-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .status-breakdown {
            padding: 1.5rem;
        }

        .status-breakdown h4 {
            color: var(--gray-400);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .status-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .status-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .status-name {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .status-icon.delivered { background: rgba(16, 185, 129, 0.2); }
        .status-icon.failed { background: rgba(239, 68, 68, 0.2); }
        .status-icon.pending { background: rgba(245, 158, 11, 0.2); }
        .status-icon.other { background: rgba(99, 102, 241, 0.2); }

        .status-count {
            font-weight: 700;
            font-size: 1.1rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: var(--gray-400);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .glass-card {
                padding: 1.5rem;
            }

            .comparison-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [file, setFile] = useState(null);
            const [senderAddress, setSenderAddress] = useState('');
            const [timeField, setTimeField] = useState('c_tm'); // 'c_tm' or 's_tm'
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [results, setResults] = useState(null);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!file || !senderAddress.trim()) return;

                setLoading(true);
                setError(null);
                setResults(null);

                const formData = new FormData();
                formData.append('file', file);
                formData.append('sender_address', senderAddress.trim());
                formData.append('time_field', timeField);

                try {
                    const response = await fetch('/api/cdr/search', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (response.ok) {
                        setResults(data);
                    } else {
                        setError(data.error);
                    }
                } catch (err) {
                    setError('An error occurred. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const getStatusIcon = (status) => {
                const s = status.toLowerCase();
                if (s.includes('deliver') || s.includes('success')) return { icon: '✅', class: 'delivered' };
                if (s.includes('fail') || s.includes('error') || s.includes('reject')) return { icon: '❌', class: 'failed' };
                if (s.includes('pending') || s.includes('wait') || s.includes('queue')) return { icon: '⏳', class: 'pending' };
                return { icon: '📋', class: 'other' };
            };

            const renderStatusBreakdown = (statuses) => {
                if (!statuses || Object.keys(statuses).length === 0) {
                    return <div className="no-results">No matches found</div>;
                }
                
                const entries = Object.entries(statuses).sort((a, b) => b[1] - a[1]);
                
                return (
                    <div className="status-list">
                        {entries.map(([status, count]) => {
                            const { icon, class: iconClass } = getStatusIcon(status);
                            return (
                                <div key={status} className="status-item">
                                    <div className="status-name">
                                        <div className={`status-icon ${iconClass}`}>{icon}</div>
                                        <span>{status || 'N/A'}</span>
                                    </div>
                                    <span className="status-count">{count.toLocaleString()}</span>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="layout">
                    <aside className="sidebar">
                        <div className="sidebar-logo">📊 CSV Analyzer</div>
                        <nav className="nav">
                            <a href="/" className="nav-link">
                                <span className="nav-icon">�</span>
                                Compare Billing Folders
                            </a>
                            <a href="/analyze" className="nav-link">
                                <span className="nav-icon">�</span>
                                Analyze All Senders
                            </a>
                            <a href="/cdr" className="nav-link active">
                                <span className="nav-icon">📱</span>
                                CDR Analyzer
                            </a>
                        </nav>
                    </aside>

                    <main className="main-content">
                        <div className="app-container">
                            <header className="header">
                                <h1>CDR Analyzer</h1>
                                <p>Analyze CDR archive by sender address and get status breakdown</p>
                            </header>

                            <div className="glass-card">
                                <form onSubmit={handleSubmit}>
                                    <div className="upload-section" style={{marginBottom: '1.5rem'}}>
                                        <h3>📁 CDR Archive</h3>
                                        <div 
                                            className={`upload-zone ${file ? 'has-file' : ''}`}
                                            onClick={() => document.getElementById('file-input').click()}
                                        >
                                            <div className="upload-icon">📂</div>
                                            <div className="upload-text">Drop file or click to upload</div>
                                            <div className="upload-hint">Supports .tar, .tar.gz, .tgz, .gz, .zip files</div>
                                            {file && <div className="file-name">📄 {file.name}</div>}
                                        </div>
                                        <input 
                                            type="file" 
                                            id="file-input"
                                            className="file-input"
                                            accept=".zip,.tar,.gz,.tar.gz,.tgz"
                                            onChange={(e) => setFile(e.target.files[0])}
                                        />
                                    </div>

                            <div className="search-section">
                                <label>🔍 Sender Address (Exact Match)</label>
                                <input 
                                    type="text"
                                    className="search-input"
                                    placeholder="Enter sender address to search..."
                                    value={senderAddress}
                                    onChange={(e) => setSenderAddress(e.target.value)}
                                />
                            </div>

                            <div className="search-section">
                                <div className="time-toggle-label">⏰ Count Records Based On</div>
                                <div className="time-toggle">
                                    <button
                                        type="button"
                                        className={`time-toggle-btn ${timeField === 'c_tm' ? 'active' : ''}`}
                                        onClick={() => setTimeField('c_tm')}
                                    >
                                        📅 c_tm (Field 90)
                                    </button>
                                    <button
                                        type="button"
                                        className={`time-toggle-btn ${timeField === 's_tm' ? 'active' : ''}`}
                                        onClick={() => setTimeField('s_tm')}
                                    >
                                        📅 s_tm (Field 3)
                                    </button>
                                </div>
                            </div>

                            <div className="form-actions">
                                <button 
                                    type="submit" 
                                    className="btn btn-primary"
                                    disabled={!file || !senderAddress.trim() || loading}
                                >
                                    {loading ? '⏳ Analyzing...' : '🔍 Analyze CDR Archive'}
                                </button>
                            </div>
                        </form>
                    </div>

                    {loading && (
                        <div className="glass-card">
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Analyzing CDR archives...</p>
                            </div>
                        </div>
                    )}

                    {error && (
                        <div className="glass-card">
                            <div className="error-box">⚠️ {error}</div>
                        </div>
                    )}

                    {results && (
                        <>
                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-value">{results.total_count.toLocaleString()}</div>
                                    <div className="stat-label">Total Matches</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-value">{Object.keys(results.statuses || {}).length}</div>
                                    <div className="stat-label">Unique Statuses</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-value">{results.files_processed}</div>
                                    <div className="stat-label">Files Processed</div>
                                </div>
                            </div>

                            <div className="glass-card">
                                <div className="results-header">
                                    <h2>📊 CDR Analysis Results</h2>
                                    <div className="result-badges">
                                        <span className="result-badge sender">Sender: {results.sender_address}</span>
                                        <span className="result-badge time">Time Field: {results.time_field}</span>
                                    </div>
                                </div>

                                <div className="archive-results">
                                    <div className="archive-header">
                                        <span className="archive-name">📁 {results.name}</span>
                                        <span className="total-count">{results.total_count.toLocaleString()}</span>
                                    </div>
                                    <div className="status-breakdown">
                                        <h4>Status Breakdown (Field 28)</h4>
                                        {renderStatusBreakdown(results.statuses)}
                                    </div>
                                </div>

                            </div>
                        </>
                    )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
