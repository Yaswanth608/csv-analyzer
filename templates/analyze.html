<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze All Senders - CSV Analyzer</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            padding: 15px 20px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            text-align: center;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 10px;
            text-decoration: none;
            color: #a0a0a0;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background: rgba(102, 126, 234, 0.15);
            color: #fff;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            overflow-y: auto;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .upload-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(102, 126, 234, 0.5);
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .upload-box h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-label {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.3s ease;
        }

        .upload-label:hover {
            transform: scale(1.05);
        }

        .file-name {
            margin-top: 10px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .results-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            color: #667eea;
        }

        .total-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        .sender-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .sender-table th,
        .sender-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sender-table th {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            font-weight: 600;
        }

        .sender-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .sender-name {
            color: #fff;
            font-weight: 500;
        }

        .sender-count {
            color: #764ba2;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .job-types-cell {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .job-type-badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            margin: 2px;
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 77, 77, 0.2);
            border: 1px solid rgba(255, 77, 77, 0.5);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .search-filter {
            margin-bottom: 15px;
        }

        .search-filter input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }

        .search-filter input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [file, setFile] = React.useState(null);
            const [results, setResults] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            const [filterText, setFilterText] = React.useState('');

            const handleAnalyze = async () => {
                if (!file) {
                    setError('Please upload a file');
                    return;
                }

                setLoading(true);
                setError('');
                setResults(null);

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (data.error) {
                        setError(data.error);
                    } else {
                        setResults(data);
                    }
                } catch (err) {
                    setError('Failed to process file. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const filteredResults = React.useMemo(() => {
                if (!results || !results.senders) return [];
                if (!filterText.trim()) return results.senders;
                return results.senders.filter(s => 
                    s.sender.toLowerCase().includes(filterText.toLowerCase())
                );
            }, [results, filterText]);

            const renderJobTypes = (jobTypes) => {
                if (!jobTypes || Object.keys(jobTypes).length === 0) return '-';
                return Object.entries(jobTypes).map(([type, count]) => (
                    <span key={type} className="job-type-badge">
                        {type || 'Unknown'}: {count.toLocaleString()}
                    </span>
                ));
            };

            return (
                <div className="layout">
                    <aside className="sidebar">
                        <div className="sidebar-logo">📊 CSV Analyzer</div>
                        <nav className="nav">
                            <a href="/" className={`nav-item ${window.location.pathname === '/' ? 'active' : ''}`}>
                                <span className="nav-icon">📁</span>
                                <span>Compare Billing Folders</span>
                            </a>
                            <a href="/analyze" className={`nav-item ${window.location.pathname === '/analyze' ? 'active' : ''}`}>
                                <span className="nav-icon">📈</span>
                                <span>Analyze All Senders</span>
                            </a>
                            <a href="/cdr" className={`nav-item ${window.location.pathname === '/cdr' ? 'active' : ''}`}>
                                <span className="nav-icon">📞</span>
                                <span>CDR Analyzer</span>
                            </a>
                        </nav>
                    </aside>

                    <main className="main-content">
                        <div className="app-container">
                            <h1>Analyze All Senders</h1>

                            {error && <div className="error">{error}</div>}

                            <div className="upload-section">
                                <div className="upload-box">
                                    <h3>📁 Upload Archive</h3>
                                    <input
                                        type="file"
                                        id="file"
                                        accept=".zip,.tar,.tar.gz,.tgz,.gz"
                                        onChange={(e) => setFile(e.target.files[0])}
                                    />
                                    <label htmlFor="file" className="upload-label">
                                        Choose Archive
                                    </label>
                                    <div className="file-name">
                                        {file ? file.name : 'No file selected'}
                                    </div>
                                    <button
                                        className="btn btn-primary"
                                        onClick={handleAnalyze}
                                        disabled={loading || !file}
                                    >
                                        {loading ? 'Analyzing...' : 'Analyze'}
                                    </button>
                                </div>
                            </div>

                            {loading && (
                                <div className="loading">
                                    <div className="spinner"></div>
                                    <p>Analyzing archive...</p>
                                </div>
                            )}

                            {results && (
                                <div className="results-section">
                                    <div className="results-header">
                                        <h2>All Senders in {results.file_name}</h2>
                                        <div className="total-count">
                                            {results.senders.length} unique senders
                                        </div>
                                    </div>

                                    <div className="search-filter">
                                        <input
                                            type="text"
                                            placeholder="Filter senders..."
                                            value={filterText}
                                            onChange={(e) => setFilterText(e.target.value)}
                                        />
                                    </div>

                                    <table className="sender-table">
                                        <thead>
                                            <tr>
                                                <th>#</th>
                                                <th>Sender Address</th>
                                                <th>Count</th>
                                                <th>Job Types</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredResults.map((item, index) => (
                                                <tr key={item.sender}>
                                                    <td>{index + 1}</td>
                                                    <td className="sender-name">{item.sender}</td>
                                                    <td className="sender-count">{item.count.toLocaleString()}</td>
                                                    <td className="job-types-cell">{renderJobTypes(item.job_types)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
