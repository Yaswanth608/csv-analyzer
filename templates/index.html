<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Billing Folders - CSV Analyzer</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            padding: 15px 20px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            text-align: center;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 10px;
            text-decoration: none;
            color: #a0a0a0;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background: rgba(102, 126, 234, 0.15);
            color: #fff;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            overflow-y: auto;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(102, 126, 234, 0.5);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .upload-box h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-label {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.3s ease;
        }

        .upload-label:hover {
            transform: scale(1.05);
        }

        .file-name {
            margin-top: 10px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .results-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-header h2 {
            color: #667eea;
        }

        .total-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .folder-result {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
        }

        .folder-result h3 {
            color: #764ba2;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .count-display {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .job-type-breakdown {
            margin-top: 15px;
        }

        .job-type-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            margin-bottom: 5px;
        }

        .job-type-name {
            color: #a0a0a0;
        }

        .job-type-count {
            color: #667eea;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 77, 77, 0.2);
            border: 1px solid rgba(255, 77, 77, 0.5);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [file1, setFile1] = React.useState(null);
            const [file2, setFile2] = React.useState(null);
            const [senderAddress, setSenderAddress] = React.useState('');
            const [results, setResults] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');

            const handleSearch = async () => {
                if (!file1 || !file2 || !senderAddress.trim()) {
                    setError('Please upload both files and enter a sender address');
                    return;
                }

                setLoading(true);
                setError('');
                setResults(null);

                const formData = new FormData();
                formData.append('file1', file1);
                formData.append('file2', file2);
                formData.append('sender_address', senderAddress.trim());

                try {
                    const response = await fetch('/api/search', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (data.error) {
                        setError(data.error);
                    } else {
                        setResults(data);
                    }
                } catch (err) {
                    setError('Failed to process files. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            const renderJobTypes = (jobTypes) => {
                if (!jobTypes || Object.keys(jobTypes).length === 0) return null;
                return (
                    <div className="job-type-breakdown">
                        <h4 style={{marginBottom: '10px', color: '#a0a0a0'}}>By Job Type:</h4>
                        {Object.entries(jobTypes).map(([type, count]) => (
                            <div key={type} className="job-type-item">
                                <span className="job-type-name">{type || 'Unknown'}</span>
                                <span className="job-type-count">{count.toLocaleString()}</span>
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="layout">
                    <aside className="sidebar">
                        <div className="sidebar-logo">📊 CSV Analyzer</div>
                        <nav className="nav">
                            <a href="/" className={`nav-item ${window.location.pathname === '/' ? 'active' : ''}`}>
                                <span className="nav-icon">📁</span>
                                <span>Compare Billing Folders</span>
                            </a>
                            <a href="/analyze" className={`nav-item ${window.location.pathname === '/analyze' ? 'active' : ''}`}>
                                <span className="nav-icon">📈</span>
                                <span>Analyze All Senders</span>
                            </a>
                            <a href="/cdr" className={`nav-item ${window.location.pathname === '/cdr' ? 'active' : ''}`}>
                                <span className="nav-icon">📞</span>
                                <span>CDR Analyzer</span>
                            </a>
                        </nav>
                    </aside>

                    <main className="main-content">
                        <div className="app-container">
                            <h1>Compare Billing Folders</h1>

                            {error && <div className="error">{error}</div>}

                            <div className="upload-section">
                                <div className="upload-box">
                                    <h3>📁 Folder 1</h3>
                                    <input
                                        type="file"
                                        id="file1"
                                        accept=".zip,.tar,.tar.gz,.tgz,.gz"
                                        onChange={(e) => setFile1(e.target.files[0])}
                                    />
                                    <label htmlFor="file1" className="upload-label">
                                        Choose Archive
                                    </label>
                                    <div className="file-name">
                                        {file1 ? file1.name : 'No file selected'}
                                    </div>
                                </div>

                                <div className="upload-box">
                                    <h3>📁 Folder 2</h3>
                                    <input
                                        type="file"
                                        id="file2"
                                        accept=".zip,.tar,.tar.gz,.tgz,.gz"
                                        onChange={(e) => setFile2(e.target.files[0])}
                                    />
                                    <label htmlFor="file2" className="upload-label">
                                        Choose Archive
                                    </label>
                                    <div className="file-name">
                                        {file2 ? file2.name : 'No file selected'}
                                    </div>
                                </div>
                            </div>

                            <div className="search-section">
                                <div className="search-row">
                                    <div className="input-group">
                                        <label>Sender Address</label>
                                        <input
                                            type="text"
                                            value={senderAddress}
                                            onChange={(e) => setSenderAddress(e.target.value)}
                                            placeholder="Enter sender address to search..."
                                        />
                                    </div>
                                    <button
                                        className="btn btn-primary"
                                        onClick={handleSearch}
                                        disabled={loading}
                                    >
                                        {loading ? 'Searching...' : 'Search'}
                                    </button>
                                </div>
                            </div>

                            {loading && (
                                <div className="loading">
                                    <div className="spinner"></div>
                                    <p>Processing archives...</p>
                                </div>
                            )}

                            {results && (
                                <div className="results-section">
                                    <div className="results-header">
                                        <h2>Results for "{senderAddress}"</h2>
                                        <div className="total-count">
                                            Total: {(results.folder1_count + results.folder2_count).toLocaleString()}
                                        </div>
                                    </div>

                                    <div className="results-grid">
                                        <div className="folder-result">
                                            <h3>📁 {results.folder1_name}</h3>
                                            <div className="count-display">
                                                {results.folder1_count.toLocaleString()}
                                            </div>
                                            {renderJobTypes(results.folder1_job_types)}
                                        </div>

                                        <div className="folder-result">
                                            <h3>📁 {results.folder2_name}</h3>
                                            <div className="count-display">
                                                {results.folder2_count.toLocaleString()}
                                            </div>
                                            {renderJobTypes(results.folder2_job_types)}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
